<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Yustya Simulator: Ultimate Pixel RPG</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #f1c40f; --bg: #050505; --ui-bg: rgba(20, 20, 30, 0.85); --ui-border: #ecf0f1; }
    * { box-sizing: border-box; user-select: none; image-rendering: pixelated; }
    body { font-family: 'Press Start 2P', cursive; background: var(--bg); color: #fff; margin: 0; padding: 0; overflow: hidden; height: 100vh; touch-action: none; }
    
    h1 { color: var(--primary); font-size: 18px; text-align: center; line-height: 1.5; text-shadow: 4px 4px 0 #000; }
    h2 { font-size: 12px; color: #bdc3c7; text-align: center; margin-bottom: 20px;}
    
    /* CRT ЕФЕКТ */
    body::after { content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); z-index: 2; background-size: 100% 2px, 3px 100%; pointer-events: none; }

    /* ЕКРАН ВХОДУ */
    #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 20px; background: radial-gradient(circle, #2c3e50 0%, #000000 100%); z-index: 1000; position: absolute; width: 100%; top: 0; left: 0; }
    .login-box { background: var(--ui-bg); border: 4px solid var(--ui-border); padding: 30px; box-shadow: 10px 10px 0px #000; text-align: center; border-radius: 8px; width: 90%; max-width: 400px; z-index: 10; }
    input { font-family: 'Press Start 2P', cursive; padding: 15px; margin: 10px 0; width: 100%; background: #000; border: 2px solid #555; color: #fff; font-size: 10px; outline: none; }
    input:focus { border-color: var(--primary); }
    button { font-family: 'Press Start 2P', cursive; padding: 15px; margin: 15px 0 0 0; width: 100%; background: #27ae60; border: 4px solid #fff; color: #fff; cursor: pointer; font-size: 12px; text-transform: uppercase; box-shadow: 0 5px 0 #1e8449; transition: 0.1s; }
    button:active { transform: translateY(5px); box-shadow: 0 0 0 #1e8449; }
    
    .avatar-setup { margin-top: 15px; border-top: 2px dashed #555; padding-top: 15px; }
    #avatarCanvas { border: 4px solid var(--primary); background: #000; margin-top: 10px; width: 80px; height: 80px; border-radius: 8px; }
    
    /* ІГРОВИЙ ЕКРАН */
    #game-container { display: none; width: 100%; height: 100%; position: relative; }
    canvas { display: block; width: 100%; height: 100%; background: #111; z-index: 1; }
    
    /* HUD */
    .hud { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 10px; pointer-events: none; z-index: 10; }
    .hud-box { background: var(--ui-bg); border: 2px solid var(--ui-border); padding: 10px; border-radius: 8px; box-shadow: 4px 4px 0 #000; }
    .hud-box span { color: var(--primary); }
    
    /* ЧАТ ЗНИЗУ ЗЛІВА */
    #chat-wrapper { position: absolute; bottom: 20px; left: 20px; width: 300px; max-width: 60%; height: 150px; background: var(--ui-bg); border: 3px solid var(--ui-border); display: flex; flex-direction: column; z-index: 10; border-radius: 8px; box-shadow: 5px 5px 0 #000; }
    #chat-box { flex: 1; overflow-y: auto; padding: 8px; font-size: 8px; color: #ecf0f1; line-height: 1.6; }
    #chat-input { display: flex; background: #000; border-top: 3px solid var(--ui-border); border-radius: 0 0 5px 5px; }
    #chat-input input { margin: 0; width: 80%; border: none; padding: 10px; font-size: 8px; }
    #chat-input button { margin: 0; width: 20%; border: none; background: #2980b9; box-shadow: none; font-size: 8px; }

    /* МЕНЮ ДІЙ (МАГАЗИН / ПИТТЯ) */
    .action-panel { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--ui-bg); border: 4px solid var(--primary); border-radius: 12px; padding: 20px; text-align: center; display: none; z-index: 50; box-shadow: 0 0 30px rgba(0,0,0,0.8); min-width: 300px; }
    .close-btn { position: absolute; top: -15px; right: -15px; background: #e74c3c; color: white; border: 3px solid #fff; border-radius: 50%; width: 35px; height: 35px; font-size: 12px; cursor: pointer; box-shadow: 0 4px 0 #c0392b;}
    .shop-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;}
    .shop-item { background: #000; border: 2px dashed #555; padding: 10px; border-radius: 8px; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center;}
    .shop-item:hover { border-color: var(--primary); transform: scale(1.05); }
    .shop-item span:last-child { color: var(--primary); font-size: 8px; margin-top: 5px; }

    /* КНОПКА ВИПИТИ */
    #drink-img-display { font-size: 50px; text-shadow: 0 0 20px var(--primary); animation: float 2s infinite ease-in-out; }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    .btn-epic { background: #e74c3c; border: 4px solid #fff; padding: 20px; font-size: 14px; width: 100%; border-radius: 10px; box-shadow: 0 6px 0 #c0392b; animation: pulse 1s infinite; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

    /* МОБІЛЬНЕ УПРАВЛІННЯ (ДЖОЙСТИК) */
    .mobile-controls { display: none; }
    @media (max-width: 768px) {
      .mobile-controls { display: block; }
      #chat-wrapper { display: none; } /* Ховаємо великий чат на мобілках */
      .hud { font-size: 8px; }
    }
    .d-pad { position: absolute; bottom: 30px; left: 30px; width: 120px; height: 120px; z-index: 20; }
    .d-btn { position: absolute; width: 40px; height: 40px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; color: #fff; font-size: 16px; display: flex; justify-content: center; align-items: center; }
    .d-btn:active { background: rgba(255,255,255,0.4); }
    .d-up { top: 0; left: 40px; } .d-down { bottom: 0; left: 40px; }
    .d-left { top: 40px; left: 0; } .d-right { top: 40px; right: 0; }
    
    .action-btns { position: absolute; bottom: 30px; right: 30px; display: flex; flex-direction: column; gap: 15px; z-index: 20;}
    .btn-game-action { background: rgba(41, 128, 185, 0.7); border: 3px solid rgba(255,255,255,0.5); border-radius: 50%; width: 60px; height: 60px; font-size: 8px; display: flex; justify-content: center; align-items: center; font-family: 'Press Start 2P', cursive; color: #fff; }
    .btn-game-action:active { background: rgba(41, 128, 185, 1); transform: scale(0.9); }
    #btn-drink-hud { background: rgba(231, 76, 60, 0.7); display: none; border-color: var(--primary); color: var(--primary);}
  </style>
</head>
<body>

  <div id="login-screen">
    <div class="login-box">
      <h1>🍻 YUSTYA SIM</h1>
      <h2>ULTIMATE RPG</h2>
      <input type="text" id="username" placeholder="Нікнейм (Юстя - VIP)">
      <input type="password" id="password" placeholder="Пароль">
      
      <div class="avatar-setup">
        <p style="font-size: 8px; color: #aaa; margin-bottom:10px;">Створи свій піксельний скін:</p>
        <input type="file" id="imageLoader" accept="image/png, image/jpeg" style="padding: 0; border: none; font-size: 8px;">
        <br>
        <label style="font-size: 8px; color: #fff;">Пікселізація: 
          <input type="range" id="pixel-size" min="2" max="64" value="16" style="width: 100px; vertical-align: middle;">
        </label>
        <br>
        <canvas id="avatarCanvas" width="64" height="64"></canvas>
      </div>
      <button onclick="login()">УВІЙТИ У СВІТ</button>
    </div>
  </div>

  <div id="game-container">
    
    <div class="hud">
      <div class="hud-box">💰 <span id="ui-money">0</span> ₴</div>
      <div class="hud-box" style="border-color: #3498db;" id="ui-zone">Вулиця</div>
      <div class="hud-box">🍺 Випито: <span id="ui-global">0</span></div>
    </div>

    <div id="chat-wrapper">
      <div id="chat-box"></div>
      <div id="chat-input">
        <input type="text" id="msg" placeholder="Пиши сюди...">
        <button onclick="sendMsg()">></button>
      </div>
    </div>

    <div id="shop-panel" class="action-panel">
      <button class="close-btn" onclick="closePanels()">X</button>
      <h3 style="color: var(--primary); margin-top:0;">БАРМЕН</h3>
      <p style="font-size: 8px; color: #aaa;">"Що будемо пити, бродяго?"</p>
      <div class="shop-list">
        <div class="shop-item" onclick="buyDrink('Пиво', 50, '🍺')"><span style="font-size: 24px;">🍺</span><span>Пиво</span><span>50 ₴</span></div>
        <div class="shop-item" onclick="buyDrink('Сидр', 70, '🍹')"><span style="font-size: 24px;">🍹</span><span>Сидр</span><span>70 ₴</span></div>
        <div class="shop-item" onclick="buyDrink('Вино', 100, '🍷')"><span style="font-size: 24px;">🍷</span><span>Вино</span><span>100 ₴</span></div>
        <div class="shop-item" onclick="buyDrink('Горілка', 150, '🍾')"><span style="font-size: 24px;">🍾</span><span>Горілка</span><span>150 ₴</span></div>
      </div>
    </div>

    <div id="drink-panel" class="action-panel">
      <button class="close-btn" onclick="closePanels()">X</button>
      <div id="drink-img-display">🍾</div>
      <p style="font-size: 10px; color: #fff; margin: 15px 0;">Твій напій готовий.</p>
      <button class="btn-epic" onclick="drinkAction()">ВИПИТИ ЗА ЮСТЮ!</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="mobile-controls">
      <div class="d-pad">
        <div class="d-btn d-up" id="btn-up">W</div>
        <div class="d-btn d-down" id="btn-down">S</div>
        <div class="d-btn d-left" id="btn-left">A</div>
        <div class="d-btn d-right" id="btn-right">D</div>
      </div>
    </div>
    
    <div class="action-btns">
      <button class="btn-game-action" id="btn-drink-hud" onclick="openDrinkPanel()">БУХЛО</button>
      <button class="btn-game-action" id="btn-interact" onclick="interact()">ДІЯ(E)</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, set, get, onValue, onDisconnect } 
      from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAaTlpTd5LtiK5TKKpE-guWRwZS0xhHgZY",
      authDomain: "yustya-simulator.firebaseapp.com",
      databaseURL: "https://yustya-simulator-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "yustya-simulator",
      storageBucket: "yustya-simulator.firebasestorage.app",
      messagingSenderId: "649029476959",
      appId: "1:649029476959:web:521d0a38ad1150cd1431ea"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const playersRef = ref(db, "players");
    const chatRef = ref(db, "chat");
    const globalRef = ref(db, "global_drinks");

    // --- СТАН ---
    let myName = "";
    let myMoney = 0;
    let inventoryDrink = null; 
    let inventoryEmoji = "";
    let avatarBase64 = null;
    let isYustya = false;
    let myLastMessage = { text: "", time: 0 }; // Для бульбашки чату
    
    // --- CANVAS ENGINE ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let networkPlayers = {};
    let playerImages = {};
    const yustyaImage = new Image(); yustyaImage.src = "texture_yustya.png";

    // Локальний гравець
    let player = {
      x: 200, y: 300, speed: 5, width: 64, height: 64, currentZone: "street",
      isMoving: false, frameCount: 0 
    };

    const worldWidth = 2000;
    const worldHeight = 800;
    let cameraX = 0; let cameraY = 0;

    const ZONES = {
      STREET: { start: 0, end: 700, name: "Вулиця 🌃", color: "#111" },
      BAR: { start: 700, end: 1400, name: "Бар 🍺", color: "#2c1e16" },
      HOME: { start: 1400, end: 2000, name: "Дім 🏠", color: "#3e2723" }
    };
    const barCounter = { x: 1000, y: 250, width: 150, height: 60 };

    const keys = { w: false, a: false, s: false, d: false };

    // --- ПІКСЕЛІЗАТОР (ВИПРАВЛЕНО) ---
    const cvs = document.getElementById('avatarCanvas');
    const cctx = cvs.getContext('2d');
    const uploader = document.getElementById('imageLoader');
    const slider = document.getElementById('pixel-size');
    let originalImg = new Image();

    uploader.addEventListener('change', function(e){
      const reader = new FileReader();
      reader.onload = function(event){
        originalImg.onload = () => updatePixelation();
        originalImg.src = event.target.result;
      }
      reader.readAsDataURL(e.target.files[0]);
    });

    slider.addEventListener('input', updatePixelation);

    function updatePixelation() {
      if(!originalImg.src) return;
      const pixelSize = parseInt(slider.value); // Від 2 до 64
      cctx.clearRect(0,0,64,64); 
      cctx.imageSmoothingEnabled = false;
      // Малюємо маленьке
      cctx.drawImage(originalImg, 0, 0, pixelSize, pixelSize);
      // Розтягуємо назад на 64x64
      cctx.drawImage(cvs, 0, 0, pixelSize, pixelSize, 0, 0, 64, 64);
    }

    // --- ЛОГІН ---
    window.login = async function() {
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value.trim();
      if(!user || !pass) { alert("Введи дані!"); return; }

      myName = user;
      isYustya = (user === "Yustya" && pass === "YustyaLove");

      const userRef = ref(db, "users/" + user);
      const snapshot = await get(userRef);
      const fallbackAvatar = cvs.toDataURL('image/png');

      if(isYustya) {
        myMoney = 999999;
        avatarBase64 = "yustya"; 
      } else if (snapshot.exists()) {
        if (snapshot.val().password !== pass) { alert("Невірний пароль!"); return; }
        myMoney = snapshot.val().money || 0;
        avatarBase64 = snapshot.val().avatar || fallbackAvatar;
      } else {
        avatarBase64 = fallbackAvatar;
        if(avatarBase64.length < 5000) { alert("Завантаж фотку!"); return; }
        myMoney = 200;
        set(userRef, { password: pass, money: myMoney, avatar: avatarBase64 });
      }

      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('game-container').style.display = 'block';
      
      resizeCanvas(); window.addEventListener('resize', resizeCanvas);

      const myPlayerRef = ref(db, "players/" + myName);
      set(myPlayerRef, { x: player.x, y: player.y, skin: avatarBase64, msg: "" });
      onDisconnect(myPlayerRef).remove(); 

      updateUI(); startGameLoop(); setupOnlinePlayers();
    };

    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }

    function setupOnlinePlayers() {
      onValue(playersRef, (snapshot) => {
        networkPlayers = snapshot.val() || {};
        for(let key in networkPlayers) {
          if(!playerImages[key] && networkPlayers[key].skin) {
            playerImages[key] = new Image();
            playerImages[key].src = (networkPlayers[key].skin === "yustya") ? "texture_yustya.png" : networkPlayers[key].skin;
          }
        }
      });
      onValue(globalRef, (sn) => { document.getElementById('ui-global').innerText = sn.val() || 0; });
      onChildAdded(chatRef, (sn) => {
        const d = sn.val();
        const box = document.getElementById('chat-box');
        box.innerHTML += `<div style="margin-bottom:5px;"><b style="color:var(--primary)">${d.username}:</b> ${d.text}</div>`;
        box.scrollTop = box.scrollHeight;
        
        // Відображаємо бульбашку над своїм персонажем
        if(d.username === myName) {
           myLastMessage = { text: d.text, time: Date.now() };
           set(ref(db, `players/${myName}/msg`), myLastMessage);
        }
      });
    }

    // --- GAME LOOP ---
    function startGameLoop() { update(); draw(); requestAnimationFrame(startGameLoop); }

    let lastSync = 0;
    function update() {
      player.isMoving = false;
      if(keys.w || mobileDpad.up) { player.y -= player.speed; player.isMoving = true; }
      if(keys.s || mobileDpad.down) { player.y += player.speed; player.isMoving = true; }
      if(keys.a || mobileDpad.left) { player.x -= player.speed; player.isMoving = true; }
      if(keys.d || mobileDpad.right) { player.x += player.speed; player.isMoving = true; }

      player.frameCount++;

      if(player.x < 0) player.x = 0;
      if(player.x > worldWidth - player.width) player.x = worldWidth - player.width;
      if(player.y < 150) player.y = 150; 
      if(player.y > worldHeight - player.height - 50) player.y = worldHeight - player.height - 50;

      if(player.x < ZONES.BAR.start) player.currentZone = "street";
      else if(player.x < ZONES.HOME.start) player.currentZone = "bar";
      else player.currentZone = "home";

      document.getElementById('ui-zone').innerText = ZONES[player.currentZone.toUpperCase()].name;

      // Плавна камера
      let targetCamX = player.x - canvas.width / 2 + player.width / 2;
      let targetCamY = player.y - canvas.height / 2 + player.height / 2;
      cameraX += (targetCamX - cameraX) * 0.1;
      cameraY += (targetCamY - cameraY) * 0.1;

      if(cameraX < 0) cameraX = 0; if(cameraX > worldWidth - canvas.width) cameraX = worldWidth - canvas.width;
      if(cameraY < 0) cameraY = 0; if(cameraY > worldHeight - canvas.height) cameraY = worldHeight - canvas.height;

      if(player.isMoving && Date.now() - lastSync > 50) {
        set(ref(db, "players/" + myName + "/x"), player.x);
        set(ref(db, "players/" + myName + "/y"), player.y);
        lastSync = Date.now();
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.save();
      ctx.translate(-cameraX, -cameraY);

      // Малюємо підлогу
      ctx.fillStyle = ZONES.STREET.color; ctx.fillRect(ZONES.STREET.start, 0, 700, worldHeight);
      
      // Тротуар на вулиці
      ctx.fillStyle = "#222"; ctx.fillRect(0, 150, 700, 100);
      
      // Бар
      ctx.fillStyle = ZONES.BAR.color; ctx.fillRect(ZONES.BAR.start, 0, 700, worldHeight);
      // Підлога бару (шахи)
      ctx.fillStyle = "rgba(0,0,0,0.2)";
      for(let i=0; i<700; i+=50) for(let j=0; j<worldHeight; j+=50) if((i+j)%100===0) ctx.fillRect(ZONES.BAR.start+i, j, 50, 50);
      
      // Неонова вивіска БАР
      ctx.fillStyle = "#fff"; ctx.font = "40px 'Press Start 2P'";
      ctx.shadowColor = "#f1c40f"; ctx.shadowBlur = 20 + Math.sin(Date.now()/200)*10;
      ctx.fillText("БАР", ZONES.BAR.start + 250, 100);
      ctx.shadowBlur = 0;

      // Дім
      ctx.fillStyle = ZONES.HOME.color; ctx.fillRect(ZONES.HOME.start, 0, 600, worldHeight);
      // Килим
      ctx.fillStyle = "#8e44ad"; ctx.fillRect(ZONES.HOME.start + 100, 200, 400, 300);

      // Барна стійка
      ctx.fillStyle = "#5d4037"; ctx.fillRect(barCounter.x, barCounter.y, barCounter.width, barCounter.height);
      ctx.fillStyle = "#fff"; ctx.font = "12px 'Press Start 2P'";
      ctx.fillText("БАРМЕН", barCounter.x + 25, barCounter.y + 35);

      // Вказівка "E" над барменом
      let distToBar = Math.hypot((player.x + 32) - (barCounter.x + 75), (player.y + 32) - (barCounter.y + 30));
      if(distToBar < 120 && player.currentZone === "bar") {
        ctx.fillStyle = "#f1c40f"; ctx.fillText("Натисни E", barCounter.x + 10, barCounter.y - 10);
      }

      // ГРАВЦІ
      for(let key in networkPlayers) {
        let p = networkPlayers[key];
        
        // Анімація ходьби/дихання
        let bobbing = 0;
        if(key === myName) {
           bobbing = player.isMoving ? Math.sin(player.frameCount * 0.4) * 5 : Math.sin(player.frameCount * 0.05) * 2;
        } else {
           // Проста імітація для інших
           bobbing = Math.sin(Date.now() * 0.005) * 2;
        }

        // Тінь
        ctx.fillStyle = "rgba(0,0,0,0.6)";
        ctx.beginPath(); ctx.ellipse(p.x + 32, p.y + 60, 25, 8, 0, 0, Math.PI*2); ctx.fill();
        
        // Скін
        if(playerImages[key]) {
          ctx.imageSmoothingEnabled = false;
          ctx.drawImage(playerImages[key], p.x, p.y + bobbing, 64, 64);
        } else {
          ctx.fillStyle = "#7f8c8d"; ctx.fillRect(p.x, p.y + bobbing, 64, 64);
        }
        
        // Ім'я
        ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(p.x - 10, p.y - 15 + bobbing, 84, 15);
        ctx.fillStyle = (key === myName) ? "#2ecc71" : (key === "Yustya" ? "#e74c3c" : "#fff");
        ctx.font = "8px 'Press Start 2P'"; ctx.textAlign = "center";
        ctx.fillText(key, p.x + 32, p.y - 5 + bobbing);

        // Бульбашка чату над головою
        if(p.msg && p.msg.text && (Date.now() - p.msg.time < 5000)) {
           ctx.fillStyle = "#fff"; ctx.fillRect(p.x - 20, p.y - 45 + bobbing, 104, 25);
           ctx.fillStyle = "#000"; ctx.fillText(p.msg.text.substring(0, 15), p.x + 32, p.y - 28 + bobbing);
           // Хвостик бульбашки
           ctx.beginPath(); ctx.moveTo(p.x + 28, p.y - 20 + bobbing); ctx.lineTo(p.x + 36, p.y - 20 + bobbing); ctx.lineTo(p.x + 32, p.y - 10 + bobbing); ctx.fill();
        }
      }

      ctx.restore();
    }

    // --- ВЗАЄМОДІЯ ---
    window.interact = function() {
      if(document.getElementById('shop-panel').style.display === 'block') { closePanels(); return; }
      
      let distToBar = Math.hypot((player.x + 32) - (barCounter.x + 75), (player.y + 32) - (barCounter.y + 30));
      if(distToBar < 120 && player.currentZone === "bar") {
        document.getElementById('shop-panel').style.display = 'block';
        return;
      }
      
      for(let key in networkPlayers) {
        if(key !== myName) {
          let dist = Math.hypot(player.x - networkPlayers[key].x, player.y - networkPlayers[key].y);
          if(dist < 80) {
             if(inventoryDrink) {
                 push(chatRef, { username: "Система", text: `🍻 ${myName} і ${key} цокнулися!`, ts: Date.now() });
                 drinkAction();
             } else {
                 let t = `Ей, ${key}, пішли вип'ємо за Юстю!`;
                 push(chatRef, { username: myName, text: t, ts: Date.now() });
                 set(ref(db, `players/${myName}/msg`), {text: t, time: Date.now()});
             }
             return;
          }
        }
      }
    }

    window.closePanels = function() { document.querySelectorAll('.action-panel').forEach(p => p.style.display = 'none'); }
    
    window.buyDrink = function(name, price, emoji) {
      if(myMoney >= price) {
        myMoney -= price; updateUI(); saveUser();
        inventoryDrink = name; inventoryEmoji = emoji;
        document.getElementById('btn-drink-hud').style.display = 'flex'; 
        closePanels();
        push(chatRef, { username: "Система", text: `${myName} взяв ${name}.`, ts: Date.now() });
      } else { alert("Нема грошей!"); }
    }

    window.openDrinkPanel = function() {
      if(player.currentZone === "street") { alert("На вулиці пити заборонено!"); return; }
      document.getElementById('drink-panel').style.display = 'block';
      document.getElementById('drink-img-display').innerText = inventoryEmoji;
    }
    
    window.drinkAction = function() {
      myMoney += 10; updateUI(); saveUser();
      get(globalRef).then(sn => set(globalRef, (sn.val()||0)+1));
      
      let t = `🍻 ВИПИВ ${inventoryDrink.toUpperCase()} ЗА ЮСТЮ!`;
      push(chatRef, { username: "Система", text: `${myName} ${t}`, ts: Date.now() });
      set(ref(db, `players/${myName}/msg`), {text: "ЗА ЮСТЮ!!!", time: Date.now()});
      
      inventoryDrink = null;
      document.getElementById('btn-drink-hud').style.display = 'none';
      closePanels();
    }

    function updateUI() { document.getElementById('ui-money').innerText = myMoney; }
    function saveUser() { if(!isYustya) set(ref(db, "users/" + myName + "/money"), myMoney); }

    window.sendMsg = function() {
      const el = document.getElementById('msg');
      if(el.value.trim() !== "") { 
         push(chatRef, { username: myName, text: el.value, ts: Date.now() }); 
         el.value = ''; 
      }
    }

    // --- УПРАВЛІННЯ ---
    window.addEventListener('keydown', e => {
      if(document.activeElement === document.getElementById('msg')) {
         if(e.key === 'Enter') sendMsg();
         return; 
      }
      if(e.key === 'w' || e.key === 'W') keys.w = true;
      if(e.key === 's' || e.key === 'S') keys.s = true;
      if(e.key === 'a' || e.key === 'A') keys.a = true;
      if(e.key === 'd' || e.key === 'D') keys.d = true;
      if(e.key === 'e' || e.key === 'E') interact(); 
    });
    window.addEventListener('keyup', e => {
      if(e.key === 'w' || e.key === 'W') keys.w = false;
      if(e.key === 's' || e.key === 'S') keys.s = false;
      if(e.key === 'a' || e.key === 'A') keys.a = false;
      if(e.key === 'd' || e.key === 'D') keys.d = false;
    });

    const mobileDpad = { up: false, down: false, left: false, right: false };
    function bindTouch(id, prop) {
      const el = document.getElementById(id);
      if(!el) return;
      el.addEventListener('touchstart', (e)=>{ e.preventDefault(); mobileDpad[prop] = true; });
      el.addEventListener('touchend', (e)=>{ e.preventDefault(); mobileDpad[prop] = false; });
    }
    bindTouch('btn-up', 'up'); bindTouch('btn-down', 'down');
    bindTouch('btn-left', 'left'); bindTouch('btn-right', 'right');
  </script>
</body>
</html>
